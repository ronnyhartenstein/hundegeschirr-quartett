services:
  generate-cards:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    entrypoint: ["sh", "-c", "pip install --quiet openai python-frontmatter Pillow && exec \"$@\"", "sh"]
    command: ["python", "generate_cards.py"]
